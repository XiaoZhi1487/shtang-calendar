<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>沙塘圩日历 - 发布新版本</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fff7ed 0%, #fef3c7 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    width: 100%;
    max-width: 520px;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(245, 158, 11, 0.15);
    padding: 32px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }
  .header-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, #f59e0b, #ea580c);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 16px rgba(234, 88, 12, 0.35);
  }
  .header-icon svg { width: 28px; height: 28px; color: #fff; stroke-width: 2; }
  .title { font-size: 22px; font-weight: 700; color: #1f2937; margin: 0; }
  .subtitle { font-size: 13px; color: #6b7280; margin-top: 4px; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #374151;
    margin-bottom: 8px;
  }
  .field label .req { color: #ef4444; }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 12px;
    padding: 0 14px;
    transition: all 0.2s;
  }
  .input-wrap:focus-within {
    border-color: #f59e0b;
    box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
  }
  .input-wrap svg { width: 18px; height: 18px; color: #d97706; flex-shrink: 0; }
  .input-wrap input,
  .input-wrap textarea {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    padding: 12px 12px;
    font-size: 14px;
    color: #1f2937;
    font-family: inherit;
    resize: vertical;
  }
  .input-wrap textarea { min-height: 96px; padding-top: 12px; padding-bottom: 12px; }

  .btn {
    width: 100%;
    padding: 14px 20px;
    background: linear-gradient(135deg, #f59e0b, #ea580c);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 6px 16px rgba(234, 88, 12, 0.25);
  }
  .btn:hover:not(:disabled) {
    background: linear-gradient(135deg, #f97316, #dc2626);
    transform: translateY(-1px);
  }
  .btn:disabled {
    background: #9ca3af;
    cursor: not-allowed;
    box-shadow: none;
  }
  .btn svg { width: 18px; height: 18px; }
  .btn .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result {
    margin-top: 18px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: fadeIn 0.25s ease;
  }
  .result.ok { background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; }
  .result.err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
  .result svg { width: 18px; height: 18px; flex-shrink: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

  .tip {
    margin-top: 24px;
    padding: 14px 16px;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 12px;
    font-size: 13px;
    color: #92400e;
    line-height: 1.6;
  }
  .tip b { display: block; margin-bottom: 4px; color: #78350f; }
  .tip ol { margin: 0; padding-left: 18px; }
  .tip li { margin-bottom: 2px; }

  .hint {
    font-size: 12px;
    color: #9ca3af;
    margin-top: 6px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z" />
        </svg>
      </div>
      <div>
        <h1 class="title">发布新版本</h1>
        <div class="subtitle">向云端数据库添加新的版本信息</div>
      </div>
    </div>

    <form id="publishForm">
      <div class="field">
        <label><span class="req">*</span> 版本号</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375" />
          </svg>
          <input id="version" type="text" placeholder="例如 1.0.6" required />
        </div>
      </div>

      <div class="field">
        <label>更新说明</label>
        <div class="input-wrap" style="align-items: flex-start;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="margin-top: 12px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5h12m-12 4.5h12m-12 4.5h7.5m-13.5-9.75l2.475-2.475a1.5 1.5 0 012.122 0l2.475 2.475m-7.07 10.725l3.75-3.75" />
          </svg>
          <textarea id="releaseNote" placeholder="例如：1. 修复登录后数据不同步&#10;2. 优化页面加载"></textarea>
        </div>
      </div>

      <div class="field">
        <label><span class="req">*</span> APK 下载链接</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688L14.94 6.94m0 0l1.688-1.688M14.94 6.94L13.19 8.688M14.94 6.94L13.19 5.25m6.56 8.25v5.25a1.5 1.5 0 01-1.5 1.5H4.5A1.5 1.5 0 013 18.75v-9.75A1.5 1.5 0 014.5 7.5h8.25" />
          </svg>
          <input id="downloadUrl" type="text" placeholder="https://..." required />
        </div>
      </div>

      <div class="field">
        <label><span class="req">*</span> 发布秘钥</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
          </svg>
          <input id="secret" type="password" placeholder="输入发布秘钥" required />
        </div>
        <div class="hint">秘钥用于验证发布权限</div>
      </div>

      <button type="submit" id="submitBtn" class="btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
        </svg>
        <span id="btnText">发布新版本</span>
      </button>

      <div id="result"></div>
    </form>

    <div class="tip">
      <b>📝 发布流程提示</b>
      <ol>
        <li>按 打包更新流程.md 完成打包，得到新的 APK 文件</li>
        <li>把 APK 上传到蓝奏云等网盘，获取直链下载地址</li>
        <li>在本页填写版本号、更新说明、下载链接和秘钥后点发布</li>
        <li>用户在 App 的「我的 → 检查更新」就能看到更新提示</li>
      </ol>
    </div>
  </div>

<script>
  // 使用线上 Render 后端地址
  const API_BASE = 'https://shtang-calendar.onrender.com';

  const form = document.getElementById('publishForm');
  const submitBtn = document.getElementById('submitBtn');
  const btnText = document.getElementById('btnText');
  const resultBox = document.getElementById('result');

  function showResult(ok, msg) {
    resultBox.innerHTML =
      '<div class="result ' + (ok ? 'ok' : 'err') + '">' +
        '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">' +
          (ok
            ? '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />'
            : '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />') +
        '</svg>' +
        '<span>' + msg + '</span>' +
      '</div>';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const version = document.getElementById('version').value.trim();
    const releaseNote = document.getElementById('releaseNote').value.trim() || '新版本发布';
    const downloadUrl = document.getElementById('downloadUrl').value.trim();
    const secret = document.getElementById('secret').value.trim();

    submitBtn.disabled = true;
    btnText.textContent = '发布中...';
    resultBox.innerHTML = '';

    try {
      const resp = await fetch(API_BASE + '/api/version/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ version, releaseNote, downloadUrl, secret })
      });
      const data = await resp.json();
      if (data.success) {
        showResult(true, data.message || ('版本 ' + version + ' 发布成功！'));
        form.reset();
      } else {
        showResult(false, data.error || '发布失败，请检查秘钥是否正确');
      }
    } catch (err) {
      showResult(false, '网络错误：无法连接到后端服务 (' + API_BASE + ')，请确认后端已启动');
    } finally {
      submitBtn.disabled = false;
      btnText.textContent = '发布新版本';
    }
  });
</script>
</body>
</html>
